
server:
  port: 8082
spring:
  application:
    name: liana-dispatch-service
  datasource:
    url: ${DISPATCH_DB_URL:jdbc:mysql://127.0.0.1:3306/dispatch_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DISPATCH_DB_USERNAME:${DB_USERNAME:root}}
    password: ${DISPATCH_DB_PASSWORD:${DB_PASSWORD:wuyujie}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
  sql:
    init:
      mode: ${DISPATCH_SQL_INIT_MODE:${SQL_INIT_MODE:never}}
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
        import-check:
          enabled: false
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
