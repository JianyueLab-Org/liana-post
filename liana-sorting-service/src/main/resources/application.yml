server:
  port: 8087
spring:
  application:
    name: liana-sorting-service
  datasource:
    url: ${SORTING_DB_URL:jdbc:mysql://127.0.0.1:3306/sorting_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SORTING_DB_USERNAME:${DB_USERNAME:root}}
    password: ${SORTING_DB_PASSWORD:${DB_PASSWORD:wuyujie}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
        import-check:
          enabled: false
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${SENTINEL_TRANSPORT_PORT:8720}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
feign:
  sentinel:
    enabled: true
  okhttp:
    enabled: false
sorting:
  xray:
    root: ${SORTING_XRAY_ROOT:x-ray}
