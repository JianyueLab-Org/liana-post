server:
  port: 8087
spring:
  application:
    name: liana-sorting-service
  datasource:
    url: jdbc:mysql://localhost:3306/sorting_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
