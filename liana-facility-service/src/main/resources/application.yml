spring:
  application:
    name: liana-facility-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
  config:
    import:
      - optional:nacos:application.yml
  datasource:
    url: ${FACILITY_DB_URL:jdbc:mysql://127.0.0.1:3306/facility_db?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${FACILITY_DB_USERNAME:root}
    password: ${FACILITY_DB_PASSWORD:${DB_PASSWORD:wuyujie}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${FACILITY_SQL_INIT_MODE:${SQL_INIT_MODE:never}}
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: 8084
facility:
  bootstrap:
    enabled: false
